name: 🐛 Bug Report
description: Report a bug to help SahiDawa improve.
title: "[BUG] <Brief description of the issue>"
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for taking the time to report a bug! 🩺
        Before submitting, please check the [existing issues](https://github.com/RatLoopz/sahidawa-india/issues) to ensure this hasn't already been reported.

  - type: dropdown
    id: component
    attributes:
      label: Which component does this bug affect?
      description: Select the part of the SahiDawa stack that has the issue.
      options:
        - "Frontend (Next.js PWA)"
        - "Backend API (Node.js/Express)"
        - "ML Service (Python/FastAPI)"
        - "Medicine Scanner/Verification"
        - "Translation / i18n"
        - "Other / Unknown"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I scan a medicine barcode, the app crashes instead of showing the verification result..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can the maintainers reproduce the bug?
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The app should display a green verification checkmark."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: Browser, OS, or Node/Python version.
      placeholder: "e.g., Chrome 120 on Android 14, Node v18.17.0"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to SahiDawa's [Code of Conduct](https://github.com/RatLoopz/sahidawa-india/blob/main/CODE_OF_CONDUCT.md).
          required: true
